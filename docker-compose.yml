services:

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    depends_on:
      - redis


  worker:
    build: .
    command: celery -A celery_app worker --loglevel=info
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    depends_on:
      - redis


  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"